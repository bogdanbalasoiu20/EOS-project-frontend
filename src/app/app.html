@if (showNavbar()) {
<nav class="navbar navbar-expand-lg navbar-light bg-light px-3">

  <a class="navbar-brand" routerLink="/home" >EOS</a>

  <div class="navbar-nav">
    <a class="nav-link" routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>

    @if (isLoggedIn()) {
      <a class="nav-link" routerLink="/mytasks" routerLinkActive="active">My Tasks</a>
      <a class="nav-link" routerLink="/search" routerLinkActive="active">Search</a>
    }
  </div>

  <div class="navbar-nav ms-auto">

    @if (!isLoggedIn()) {
      <a class="nav-link" routerLink="/login">
        Sign In
      </a>
    }

    @if (isLoggedIn()) {
      <span class="navbar-text me-3">
        {{ username }}
      </span>

      <a class="nav-link" (click)="logout()">
        Logout
      </a>
    }

  </div>

</nav>
}

<div class="container mt-4">
  <router-outlet></router-outlet>
</div>
